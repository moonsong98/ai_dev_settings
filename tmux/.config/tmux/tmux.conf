# ╔══════════════════════════════════════════╗
# ║  tmux configuration                      ║
# ║  크로스 플랫폼 (macOS / Linux)           ║
# ╚══════════════════════════════════════════╝

# ─── 기본 설정 ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on       # Neovim autoread 연동에 필수
set -g set-clipboard on

# ─── Prefix: C-a ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── 창 분할 (직관적 키) ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 새 윈도우도 현재 경로 유지
bind c new-window -c "#{pane_current_path}"

# ─── 패인 이동 (vim 스타일) ───
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── 패인 크기 조절 ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── vi 모드 ───
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── OS별 클립보드 연동 ───
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname | grep -q Linux" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard 2>/dev/null || xsel --clipboard --input'"

# ─── 설정 리로드 ───
bind r source-file ~/.config/tmux/tmux.conf \; display "설정 리로드 완료"

# ─── Claude Code 전용 레이아웃 ───
# prefix + C : Neovim(좌) + Claude Code(우) 레이아웃
bind C split-window -h -l 40% -c "#{pane_current_path}" \; \
    send-keys "claude" Enter

# ─── 상태바 ───
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=blue,bold] #S #[default]│ "
set -g status-right "│ #[fg=yellow]%H:%M #[fg=white]%m/%d"

# 활성 윈도우 강조
setw -g window-status-current-format "#[fg=green,bold] #I:#W "
setw -g window-status-format " #I:#W "

# 패인 보더
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=brightblack"

# ─── TPM 플러그인 ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'     # prefix + C-s 저장, C-r 복원

# Resurrect: neovim 세션도 복원
set -g @resurrect-strategy-nvim 'session'

# TPM 초기화 (이 줄은 반드시 맨 아래)
run '~/.tmux/plugins/tpm/tpm'
