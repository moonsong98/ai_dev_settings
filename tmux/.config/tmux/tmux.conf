# ╔══════════════════════════════════════════╗
# ║  tmux configuration                      ║
# ║  크로스 플랫폼 (macOS / Linux)           ║
# ╚══════════════════════════════════════════╝

# ─── 기본 설정 ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on       # Neovim autoread 연동에 필수
set -g set-clipboard on

# ─── 터미널 타이틀 (iTerm 탭 이름) ───
set -g set-titles on
set -g set-titles-string "#S · #W"

# Claude Code 는 pane_current_command 가 자기 버전("2.1.150" 등) 으로 잡혀서
# 윈도우 이름이 버전 숫자로 보이는 문제 → 버전 패턴이면 "claude" 로 치환
setw -g automatic-rename-format '#{?pane_in_mode,[tmux],#{?#{m/r:^[0-9]+\.[0-9]+,#{pane_current_command}},claude,#{pane_current_command}}}#{?pane_dead,[dead],}'

# ─── Prefix: C-a ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── 창 분할 (직관적 키) ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 새 윈도우도 현재 경로 유지
bind c new-window -c "#{pane_current_path}"

# ─── 패인 이동 (vim 스타일) ───
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── 패인 크기 조절 ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── vi 모드 ───
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── OS별 클립보드 연동 ───
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname | grep -q Linux" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard 2>/dev/null || xsel --clipboard --input'"

# ─── 설정 리로드 ───
bind r source-file ~/.config/tmux/tmux.conf \; display "설정 리로드 완료"

# ─── Claude Code 전용 레이아웃 ───
# prefix + C : 우측 40% 에 claude 패인만 띄움 (기존, 가벼움)
bind C split-window -h -l 40% -c "#{pane_current_path}" \; \
    send-keys "claude" Enter

# prefix + C-c : 현재 윈도우를 3-pane 레이아웃으로 재구성
#   좌 50% claude | 우상 65% nvim | 우하 35% shell
# 주의: 같은 윈도우의 다른 패인은 강제 종료됨 (kill-pane -a)
# 호출 시점의 현재 패인은 셸 프롬프트 상태여야 함 (claude/nvim 안에서 호출하면 키 입력이 그쪽으로 감)
bind C-c kill-pane -a \; \
    send-keys "claude" Enter \; \
    split-window -h -l 50% -c "#{pane_current_path}" \; \
    send-keys "nvim ." Enter \; \
    split-window -v -l 35% -c "#{pane_current_path}"

# ─── 상태바 ───
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 60
set -g status-right-length 140

# 좌측: 세션 · git 브랜치 · claude HUD (세션에 claude 패인이 있으면 표시)
set -g status-left "#[fg=blue,bold] #S #[fg=brightblack]│#[fg=magenta] #(cd '#{pane_current_path}' && git symbolic-ref --short HEAD 2>/dev/null) #[fg=brightblack]│#(tmux list-panes -s -F '##{pane_current_command}' 2>/dev/null | grep -qE '^[0-9]+\\.[0-9]+' && printf '#[fg=green] ● claude #[fg=brightblack]│') "

# 우측: prefix indicator · CPU · RAM · 배터리 · 시간
set -g status-right "#{prefix_highlight}#[fg=brightblack]│#[fg=cyan] CPU #{cpu_percentage} #[fg=brightblack]│#[fg=yellow] RAM #{ram_percentage} #[fg=brightblack]│ #{battery_icon} #{battery_percentage} #[fg=brightblack]│#[fg=yellow] %H:%M #[fg=white]%m/%d "

# 활성 윈도우 강조
setw -g window-status-current-format "#[fg=green,bold] #I:#W "
setw -g window-status-format " #I:#W "

# 패인 보더
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=brightblack"

# ─── TPM 플러그인 ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'     # prefix + C-s 저장, C-r 복원

# HUD (상태바 정보)
set -g @plugin 'tmux-plugins/tmux-cpu'           # #{cpu_percentage} #{ram_percentage}
set -g @plugin 'tmux-plugins/tmux-battery'       # #{battery_icon} #{battery_percentage}
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # #{prefix_highlight}

# Resurrect: neovim 세션도 복원
set -g @resurrect-strategy-nvim 'session'

# tmux-battery 상태 아이콘 — 기본값이 emoji (⚠️ 등) 인데 Hack Nerd Font 가 emoji 지원
# 약해서 □ 로 fallback. Nerd Font 의 전원/볼트 글리프로 교체.
#   attached  = 충전기 꽂혀있지만 charging 아님 (80% 한도 도달 등)
#   charging  = 충전 중
#   charged   = 100% 만충
set -g @batt_icon_status_attached ''       # nf-fa-plug
set -g @batt_icon_status_charging ''       # nf-fa-bolt
set -g @batt_icon_status_charged ''        # nf-fa-bolt (만충도 같은 글리프)
set -g @batt_icon_status_discharging ''    # nf-fa-battery_full (충전 안 됨 = 배터리 사용)
set -g @batt_icon_status_unknown '?'

# prefix-highlight 스타일
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'yellow,bold'
set -g @prefix_highlight_prefix_prompt ' PFX '
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=green,bold'
set -g @prefix_highlight_copy_prompt ' COPY '

# TPM 초기화 (이 줄은 반드시 맨 아래)
run '~/.config/tmux/plugins/tpm/tpm'
