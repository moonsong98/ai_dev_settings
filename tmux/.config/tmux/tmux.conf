# ╔══════════════════════════════════════════╗
# ║  tmux configuration                      ║
# ║  cross-platform (macOS / Linux)          ║
# ╚══════════════════════════════════════════╝

# ─── Base settings ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on       # required for Neovim autoread to fire
set -g set-clipboard on

# Forward SSH_* env into new sessions so the SSH chip below can detect it.
set -ga update-environment "SSH_CONNECTION SSH_CLIENT SSH_TTY SSH_AUTH_SOCK"

# ─── Terminal title (iTerm tab name) ───
set -g set-titles on
set -g set-titles-string "#S · #W"

# Claude Code reports its version (e.g. "2.1.150") as pane_current_command, so
# the auto-named window ends up looking like a version number. If the command
# matches a version pattern, substitute "claude" instead.
setw -g automatic-rename-format '#{?pane_in_mode,[tmux],#{?#{m/r:^[0-9]+\.[0-9]+,#{pane_current_command}},claude,#{pane_current_command}}}#{?pane_dead,[dead],}'

# ─── Prefix: C-a ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Window splits (intuitive keys) ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also inherit the current path.
bind c new-window -c "#{pane_current_path}"

# ─── Pane navigation (vim-style) ───
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane resize ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── vi mode ───
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Per-OS clipboard ───
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname | grep -q Linux" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard 2>/dev/null || xsel --clipboard --input'"

# ─── Reload config ───
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ─── Claude Code-specific layouts ───
# prefix + C : open a claude pane in the right 40% of the window (lightweight).
bind C split-window -h -l 40% -c "#{pane_current_path}" \; \
    send-keys "claude" Enter

# prefix + C-c : rebuild the current window into a 3-pane layout:
#   left 50% claude | top-right 65% nvim | bottom-right 35% shell
# Note: other panes in this window are force-killed (kill-pane -a).
# At call time the focused pane must be at a shell prompt — invoking from inside
# claude/nvim sends the keystrokes into those apps instead of the shell.
bind C-c kill-pane -a \; \
    send-keys "claude" Enter \; \
    split-window -h -l 50% -c "#{pane_current_path}" \; \
    send-keys "nvim ." Enter \; \
    split-window -v -l 35% -c "#{pane_current_path}"

# ─── Status bar ───
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 80
set -g status-right-length 140

# SSH / local chip — shows red "SSH user@host" on a remote machine, dim "local"
# locally. The chip script lives in this repo so it's easy to tweak.
SSH_CHIP="#(${HOME}/.config/tmux/scripts/ssh-chip.sh)"

# Left: session · git branch · SSH/local chip · claude HUD (when a claude pane exists)
set -g status-left "#[fg=blue,bold] #S #[fg=brightblack]│#[fg=magenta] #(cd '#{pane_current_path}' && git symbolic-ref --short HEAD 2>/dev/null) #[fg=brightblack]│ ${SSH_CHIP} #[fg=brightblack]│#(tmux list-panes -s -F '##{pane_current_command}' 2>/dev/null | grep -qE '^[0-9]+\\.[0-9]+' && printf '#[fg=green] ● claude #[fg=brightblack]│') "

# Right: prefix indicator · CPU · RAM · battery · time
set -g status-right "#{prefix_highlight}#[fg=brightblack]│#[fg=cyan] CPU #{cpu_percentage} #[fg=brightblack]│#[fg=yellow] RAM #{ram_percentage} #[fg=brightblack]│ #{battery_icon} #{battery_percentage} #[fg=brightblack]│#[fg=yellow] %H:%M #[fg=white]%m/%d "

# Active-window highlight
setw -g window-status-current-format "#[fg=green,bold] #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=brightblack"

# ─── TPM plugins ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'     # prefix + C-s save, C-r restore

# HUD (status-bar info)
set -g @plugin 'tmux-plugins/tmux-cpu'           # #{cpu_percentage} #{ram_percentage}
set -g @plugin 'tmux-plugins/tmux-battery'       # #{battery_icon} #{battery_percentage}
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # #{prefix_highlight}

# Resurrect: also restore neovim sessions
set -g @resurrect-strategy-nvim 'session'

# tmux-battery status icons — defaults are emoji (⚠️ etc.) but Hack Nerd Font's
# emoji coverage is weak and they render as □. Use Nerd Font plug / bolt glyphs.
#   attached  = charger plugged in but not actively charging (e.g. at 80% limit)
#   charging  = currently charging
#   charged   = fully charged (100%)
set -g @batt_icon_status_attached ''       # nf-fa-plug
set -g @batt_icon_status_charging ''       # nf-fa-bolt
set -g @batt_icon_status_charged ''        # nf-fa-bolt (same glyph at 100%)
set -g @batt_icon_status_discharging ''    # nf-fa-battery_full (running off the battery)
set -g @batt_icon_status_unknown '?'

# prefix-highlight style
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'yellow,bold'
set -g @prefix_highlight_prefix_prompt ' PFX '
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=green,bold'
set -g @prefix_highlight_copy_prompt ' COPY '

# Initialize TPM — must be the last line.
run '~/.config/tmux/plugins/tpm/tpm'
