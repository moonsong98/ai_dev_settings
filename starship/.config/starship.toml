"$schema" = 'https://starship.rs/config-schema.json'

# 2-line "Powerline-flat" prompt
#   ┏━ <cwd> ❖ <git> ❖ <lang/version> ❖ <cmd_duration>
#   ┗━❯ █
format = """
[┏━ ](bold blue)$directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration
[┗━](bold blue)$character"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ─── cwd ───
[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "cyan bold"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " "
read_only_style = "red"

# ─── git branch + status ───
# 분리자 ❖ 는 세그먼트의 leading 부분에 둠 → 비활성 시 자동으로 사라짐
[git_branch]
format = " [❖](dim blue) [$symbol$branch]($style)"
symbol = " "
style = "purple bold"

[git_status]
format = "[ $all_status$ahead_behind]($style)"
style = "yellow bold"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = "≡${count}"
deleted = "x${count}"
conflicted = "${count}"

# ─── language toolchains (디렉토리에 해당 파일 있을 때만 표시) ───
[nodejs]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
format = " [❖](dim blue) [$symbol${pyenv_prefix}(${version})(\\($virtualenv\\))]($style)"
symbol = " "
style = "yellow"
pyenv_version_name = true
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", ".python-version"]

[rust]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "red"

[golang]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "cyan"

# ─── 실행 시간 (2초 이상 걸린 명령어만) ───
[cmd_duration]
format = " [❖](dim blue) [$duration]($style)"
style = "dim white"
min_time = 2000
