"$schema" = 'https://starship.rs/config-schema.json'

# 2-line "Powerline-flat" prompt
#   ┏━ [user@host on SSH] <cwd> ❖ <git> ❖ <lang/version> ❖ <cmd_duration>
#   ┗━❯ █
format = """
[┏━ ](bold blue)$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration
[┗━](bold blue)$character"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ─── SSH indicator: show "user@host" only over SSH ───
# Together these two modules produce, e.g., "user@server.example " in red, which
# makes it obvious you're not on your laptop. On local sessions they render nothing.
[username]
format = "[$user]($style)"
style_user = "red bold"
style_root = "red bold"
show_always = false   # only when SSH'd or running as root

[hostname]
format = "[@$hostname ]($style)"
ssh_only = true       # only when SSH'd
style = "red bold"
trim_at = "."         # short hostname

# ─── cwd ───
[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "cyan bold"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " "
read_only_style = "red"

# ─── git branch + status ───
# The ❖ separator sits at the LEADING edge of the segment — so when the
# segment is empty/disabled, the separator disappears with it.
[git_branch]
format = " [❖](dim blue) [$symbol$branch]($style)"
symbol = " "
style = "purple bold"

[git_status]
format = "[ $all_status$ahead_behind]($style)"
style = "yellow bold"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = "≡${count}"
deleted = "x${count}"
conflicted = "${count}"

# ─── Language toolchains (shown only when matching project files exist) ───
[nodejs]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
format = " [❖](dim blue) [$symbol${pyenv_prefix}(${version})(\\($virtualenv\\))]($style)"
symbol = " "
style = "yellow"
pyenv_version_name = true
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", ".python-version"]

[rust]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "red"

[golang]
format = " [❖](dim blue) [$symbol($version)]($style)"
symbol = " "
style = "cyan"

# ─── Command duration (only for commands ≥ 2 s) ───
[cmd_duration]
format = " [❖](dim blue) [$duration]($style)"
style = "dim white"
min_time = 2000
